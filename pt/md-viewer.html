    <!-- Import zero-md and extend with GFM Footnote support -->

        },
        Vietnamese: {
          description: "Chú thích",
          backRefLabel: "Quay lại tham chiếu {0}",
        },
        Arabic: {
          description: "الحواشي",
          backRefLabel: "العودة إلى المرجع {0}",
        },
        Hindi: {
          description: "पाद टिप्पणियाँ",
          backRefLabel: "संदर्भ {0} पर वापस जाएं",
        },
        Greek: {
          description: "Υποσημειώσεις",
          backRefLabel: "Επιστροφή στην αναφορά {0}",
        },
        Korean: { description: "각주", backRefLabel: "참조 {0}로 돌아가기" },
        Portuguese: {
          description: "Notas de rodapé",
          backRefLabel: "Voltar à referência {0}",

        Bengali: {
          description: "পাদটীকা",
          backRefLabel: "রেফারেন্স {0} এ ফিরে যান",

        Punjabi: {
          description: "ਫੁਟਨੋਟ",
          backRefLabel: "ਹਵਾਲੇ {0} ਤੇ ਵਾਪਸ ਜਾਓ",
        },
        Persian: { description: "پاورقی", backRefLabel: "بازگشت به مرجع {0}" },
        Swahili: {
          description: "Maelezo ya chini",
          backRefLabel: "Rudi kwenye rejeo {0}",
        },
        Indonesian: {
          description: "Catatan kaki",
          backRefLabel: "Kembali ke referensi {0}",
        },
        Polish: {
          description: "Przypisy",
          backRefLabel: "Powrót do odniesienia {0}",
        },
        Dutch: {

        },

          description: "རྐང་མཆན།",
          backRefLabel: "ཁུངས་འདྲེན་ {0} ལ་ཕྱིར་འཐེན།",

        Sinhala: { description: "අඩිසටහන්", backRefLabel: "යොමු {0} වෙත ආපසු" },
        Tamil: {
          description: "அடிக்குறிப்புகள்",
          backRefLabel: "குறிப்பு {0} க்கு திரும்பு",

          description: "ପାଦଟୀକା",

        },
        Armenian: {
          description: "Ծանոթագրություններ",

        },
        Urdu: {
          description: "حاشیہ جات",
          backRefLabel: "حوالہ {0} پر واپس جائیں",
        },
      };

      function getFootnoteStrings(languagesField = "") {
        const primaryLanguage = languagesField.split(",")[0].trim();
        return FOOTNOTE_I18N[primaryLanguage] ?? FOOTNOTE_I18N["English"];
      }

      customElements.define(
        "zero-md",
        class extends ZeroMd {
          async parse(obj) {
            // this.marked is fully initialized by the time parse() is called.
            // Apply the footnote extension each time, keyed to the current language.
            const lang = this.dataset.bookLanguage || "English";
            const { description, backRefLabel } = getFootnoteStrings(lang);
            this.marked.use(markedFootnote({ description, backRefLabel }));

            return super.parse(obj);
          }
        },
      );
    </script>

  <body>
    <!-- Book metadata header — populated by JS -->
    <header id="book-header">
      <a class="back-link" id="back-link">← Voltar para a biblioteca</a>

    <!-- zero-md element — src set dynamically by JS -->
    <zero-md id="md-viewer">
      <template data-append>
        <style>
          .markdown-body {

          .markdown-body h2,
          .markdown-body h3,

          .markdown-body h5,

            font-family:
              "IM Fell English SC", "Palatino Linotype", Palatino, Georgia,
              serif;
            font-weight: normal;
            color: #3b1f0a;
            border-bottom: 1px solid #c8a96e88;
            padding-bottom: 0.3em;
            margin-top: 2.2em;

            font-size: 1.9rem;

          }

          }
          .markdown-body h4,
          .markdown-body h5,

    <script>
      (async () => {
        const statusEl = document.getElementById("status-message");
        const headerEl = document.getElementById("book-header");
        const mdViewer = document.getElementById("md-viewer");
        const titleEl = document.getElementById("book-title");
        const authorEl = document.getElementById("book-author");
        const yearEl = document.getElementById("book-year");
        const langEl = document.getElementById("book-languages");
        const pageTitleEl = document.querySelector("title");
        const backLinkEl = document.getElementById("back-link");

        // ── 1. Read the book ID from the URL hash e.g. index.html#000001 ──
        const bookId = location.hash.replace("#", "").trim();

        // ── 2. Set the back-link href, using bookId (or default) as the fragment ──
        const backId = bookId || "000001";
        backLinkEl.href = `https://cdn.solaranamnesis.com/library-test/examples/book_shelf-pt.html#${backId}`;

        if (!bookId) {
          statusEl.textContent =
            "No book selected. Please return to the library and choose a title.";
          return;
        }

        // ── 3. Fetch the shared books catalogue localized ───────────────────────────
        let books;
        try {
          const response = await fetch("books.json");
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          books = await response.json();
        } catch (err) {
          statusEl.textContent =
            "Could not load the book catalogue. Please try again later.";
          console.error("Failed to fetch books.json:", err);
          return;
        }

        // ── 4. Find the matching book entry ───────────────────────────────
        const book = books.find((b) => b.id === bookId);

        if (!book) {
          statusEl.textContent = `No book found with id "${bookId}". Please return to the library.`;
          return;
        }

        // ── 5. Find the footer link with text "Markdown" ────────────────
        const mdLink = book.footer.find((f) =>
          f.text.trim().includes("Markdown"),
        );

        if (!mdLink) {
          statusEl.textContent = `No HTML reading link found for "${book.title}".`;
          return;
        }

        const markdownSrc = mdLink.link;

        // ── 7. Update the page <title> and visible header ─────────��───────
        pageTitleEl.textContent = `${book.title} — ${book.author}`;
        titleEl.textContent = book.title;
        authorEl.textContent = book.author;
        yearEl.textContent = book.year;
        langEl.textContent = book.languages;

        // ── 7b. Pass language to zero-md BEFORE setting src ───────────────
        //        so load() can pick up the right footnote strings.
        //        book.languages is comma-separated English names, e.g. "German, French"
        mdViewer.dataset.bookLanguage = book.languages;

        headerEl.style.display = "block";
        statusEl.style.display = "none";

        // ── 8. Point zero-md at the raw markdown file ─────────────────────
        mdViewer.setAttribute("src", markdownSrc);
      })();
    </script>
    <script>
      (function () {
        const btn = document.getElementById("scroll-top-btn");
        let ticking = false;
        window.addEventListener(
          "scroll",
          function () {
            if (!ticking) {
              requestAnimationFrame(function () {
                btn.classList.toggle("visible", window.scrollY > 300);
                ticking = false;
              });
              ticking = true;
            }
          },
          { passive: true },
        );
        btn.addEventListener("click", function () {
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      })();
    </script>
