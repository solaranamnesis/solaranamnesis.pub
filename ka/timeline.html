      "use strict";

      /* ------------------------------------------------------------------ */
      /*  Language → colour palette (11 first-languages in the dataset)     */
      /* ------------------------------------------------------------------ */
      const LANG_COLORS = {
        "ინგლისური": "#3273dc",
        "გერმანული": "#c44d3d",
        "ფრანგული": "#9b59b6",
        "ლათინური": "#e1b12c",
        "ბერძნული": "#27ae60",
        "სომხური": "#e67e22",
        "ჰოლანდიური": "#00d1b2",
        "ესპანური": "#f06292",
        "შვედური": "#8d6e63",
        "ჩინური": "#ef5350",
        "ტამილური": "#26c6da",
      };
      const FALLBACK_COLOR = "#888";

      /* ------------------------------------------------------------------ */
      /*  Helpers                                                           */
      /* ------------------------------------------------------------------ */
      const parseYear = (yearStr) => {
        const m = String(yearStr).match(/\d+/);
        return m ? +m[0] : null;
      };

      const escapeHtml = (s) =>
        String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");

      const firstLang = (langStr) => langStr.split(",")[0].trim();

      const langColor = (langStr) =>
        LANG_COLORS[firstLang(langStr)] || FALLBACK_COLOR;

      /* ------------------------------------------------------------------ */
      /*  Main                                                              */
      /* ------------------------------------------------------------------ */
      document.addEventListener("DOMContentLoaded", () => {
        /* update zoom hint for Mac users */
        const hint = document.getElementById("zoom-hint");
        if (hint && /Mac|iPhone|iPad/.test(navigator.platform || "")) {
          hint.textContent = "\u2318 + scroll to zoom";
        }

        fetch("books.json")
          .then((r) => r.json())
          .then((allBooks) => {
            if (!allBooks || !allBooks.length) return;
            buildTimeline(allBooks);
          })
          .catch((err) => console.error("Error loading books:", err));
      });

      function buildTimeline(allBooks) {
        /* ---- pre-process ---- */
        allBooks.forEach((b) => {
          b._year = parseYear(b.year);
          b._firstLang = firstLang(b.languages);
        });
        allBooks.sort((a, b) => a._year - b._year);

        /* ---- populate filter dropdowns ---- */
        const subjectSelect = document.getElementById("subject-select");
        const authorSelect = document.getElementById("author-select");
        const languageSelect = document.getElementById("language-select");
        const collectionSelect = document.getElementById("collection-select");

        const allSubjects = [
          ...new Set(
            allBooks.flatMap((b) => b.subjects.split(",").map((s) => s.trim())),
          ),
        ].sort();
        const allAuthors = [
          ...new Set(
            allBooks.flatMap((b) => b.author.split(",").map((s) => s.trim())),
          ),
        ].sort();
        const allLanguages = [
          ...new Set(
            allBooks.flatMap((b) =>
              b.languages.split(",").map((s) => s.trim()),
            ),
          ),
        ].sort();
        const allCollections = [
          ...new Set(
            allBooks.flatMap((b) =>
              b.collections.split(";").map((s) => s.trim()),
            ),
          ),
        ].sort();

        allSubjects.forEach((s) => {
          const o = document.createElement("option");
          o.value = s;
          o.textContent = s;
          subjectSelect.appendChild(o);
        });
        allAuthors.forEach((a) => {
          const o = document.createElement("option");
          o.value = a;
          o.textContent = a;
          authorSelect.appendChild(o);
        });
        allLanguages.forEach((l) => {
          const o = document.createElement("option");
          o.value = l;
          o.textContent = l;
          languageSelect.appendChild(o);
        });
        allCollections.forEach((c) => {
          const o = document.createElement("option");
          o.value = c;
          o.textContent = c;
          collectionSelect.appendChild(o);
        });

        /* ---- legend ---- */
        const legendDiv = document.getElementById("legend");
        Object.entries(LANG_COLORS).forEach(([lang, color]) => {
          const span = document.createElement("span");
          span.className = "legend-item";
          span.innerHTML =
            '<span class="legend-swatch" style="background:' +
            color +
            '"></span>' +
            escapeHtml(lang);
          legendDiv.appendChild(span);
        });

        /* ---- dimensions ---- */
        const container = document.getElementById("timeline-chart");
        const containerWidth = container.clientWidth || 900;
        const margin = { top: 30, right: 30, bottom: 50, left: 30 };
        const barHeight = 22;
        const barPad = 3;

        let filteredBooks = allBooks.slice();

        /* ---- get current filtered books ---- */
        function getFiltered() {
          let books = allBooks;
          const sv = subjectSelect.value;
          const av = authorSelect.value;
          const lv = languageSelect.value;
          const cv = collectionSelect.value;
          if (sv) books = books.filter((b) => b.subjects.includes(sv));
          if (av) books = books.filter((b) => b.author.includes(av));
          if (lv) books = books.filter((b) => b.languages.includes(lv));
          if (cv) books = books.filter((b) => b.collections.includes(cv));
          return books;
        }

        /* ---- sqrt-based scale for non-linear axis ---- */
        /* We use a sqrt transform: map year → sqrt(year - minYear) → pixels */
        const yearMin = 1600;
        const yearMax = 2050;

        function sqrtVal(year) {
          return Math.sqrt(year - yearMin);
        }

        function createXScale(width) {
          return d3
            .scaleLinear()
            .domain([sqrtVal(yearMin), sqrtVal(yearMax)])
            .range([margin.left, width - margin.right]);
        }

        function xPos(year, xScale) {
          return xScale(sqrtVal(year));
        }

        /* Inverse: pixel → year */
        function xInverse(px, xScale) {
          const sqrtY = xScale.invert(px);
          return sqrtY * sqrtY + yearMin;
        }

        /* Tick values: produce nice year ticks */
        function yearTicks() {
          const ticks = [];
          for (let y = 1600; y <= 1800; y += 50) ticks.push(y);
          for (let y = 1810; y <= 1900; y += 10) ticks.push(y);
          for (let y = 1920; y <= yearMax; y += 20) ticks.push(y);
          return ticks;
        }

        let lastTouchTime = 0;

        /* ---- render ---- */
        function render() {
          filteredBooks = getFiltered();
          filteredBooks.sort((a, b) => a._year - b._year);

          const chartWidth = Math.max(containerWidth, 800);
          const chartHeight =
            margin.top +
            filteredBooks.length * (barHeight + barPad) +
            margin.bottom;

          /* clear */
          container.innerHTML = "";

          const svg = d3
            .select(container)
            .append("svg")
            .attr("width", chartWidth)
            .attr("height", chartHeight)
            .attr("role", "img")
            .attr(
              "aria-label",
              "Interactive timeline of " +
                filteredBooks.length +
                " books from 1600 to 2022",
            );

          /* clip path for the chart area */
          svg
            .append("defs")
            .append("clipPath")
            .attr("id", "chart-clip")
            .append("rect")
            .attr("x", margin.left)
            .attr("y", margin.top)
            .attr("width", chartWidth - margin.left - margin.right)
            .attr("height", chartHeight - margin.top - margin.bottom);

          const xScale = createXScale(chartWidth);

          /* x-axis */
          const ticks = yearTicks();
          const xAxis = d3
            .axisBottom()
            .scale(xScale)
            .tickValues(ticks.map((y) => sqrtVal(y)))
            .tickFormat((d) => {
              const yr = Math.round(d * d + yearMin);
              return String(yr);
            });

          const gXAxis = svg
            .append("g")
            .attr(
              "transform",
              "translate(0," + (chartHeight - margin.bottom) + ")",
            )
            .call(xAxis);

          gXAxis.selectAll("text").style("font-size", "10px");

          /* grid lines */
          const gGrid = svg
            .append("g")
            .attr("class", "grid-lines")
            .attr("clip-path", "url(#chart-clip)");

          ticks.forEach((y) => {
            gGrid
              .append("line")
              .attr("x1", xPos(y, xScale))
              .attr("x2", xPos(y, xScale))
              .attr("y1", margin.top)
              .attr("y2", chartHeight - margin.bottom)
              .attr("stroke", "var(--grid-color)")
              .attr("stroke-width", 0.5)
              .attr("stroke-dasharray", "3,3");
          });

          /* book bars group (clipped) */
          const gBars = svg
            .append("g")
            .attr("class", "bars")
            .attr("clip-path", "url(#chart-clip)");

          /* tooltip ref */
          const tooltip = document.getElementById("timeline-tooltip");
          const ariaLive = document.getElementById("aria-live-region");

          /* draw bars */
          const barMinWidth = 8;

          filteredBooks.forEach((book, i) => {
            const y = margin.top + i * (barHeight + barPad);
            const x = xPos(book._year, xScale);
            const bw = barMinWidth;
            const color = langColor(book.languages);

            const g = gBars
              .append("g")
              .attr("class", "bar-book")
              .attr("tabindex", "0")
              .attr("role", "link")
              .attr(
                "aria-label",
                escapeHtml(book.title) +
                  " by " +
                  escapeHtml(book.author) +
                  ", " +
                  book.year,
              );

            /* thin bar at publication year */
            g.append("rect")
              .attr("x", x - bw / 2)
              .attr("y", y)
              .attr("width", bw)
              .attr("height", barHeight)
              .attr("rx", 3)
              .attr("fill", color);

            /* full-width invisible hit area for label row */
            g.append("rect")
              .attr("x", x + bw / 2 + 4)
              .attr("y", y)
              .attr(
                "width",
                Math.max(chartWidth - margin.right - x - bw / 2 - 4, 0),
              )
              .attr("height", barHeight)
              .attr("fill", "transparent");

            /* title label next to bar */
            g.append("text")
              .attr("x", x + bw / 2 + 6)
              .attr("y", y + barHeight / 2)
              .attr("dy", "0.35em")
              .attr("font-size", "11px")
              .attr("fill", "var(--text-color)")
              .text(
                book.title.length > 60
                  ? book.title.slice(0, 57) + "..."
                  : book.title,
              );

            /* interactions */
            g.on("mouseenter", (event) => {
              const authorHtml = book.author
                .split(", ")
                .map((n) => {
                  if (book.author_url && book.author_url[n]) {
                    return (
                      '<a href="' +
                      escapeHtml(book.author_url[n]) +
                      '" target="_blank" rel="noopener noreferrer">' +
                      escapeHtml(n) +
                      "</a>"
                    );
                  }
                  return escapeHtml(n);
                })
                .join(", ");

              const subjectsShort = book.subjects
                .split(",")
                .slice(0, 5)
                .map((s) => s.trim())
                .join(", ");

              const bookUrl = "https://cdn.solaranamnesis.com/library-test/examples/book_shelf.html#" + encodeURIComponent(book.id);

              tooltip.innerHTML =
                '<strong><a href="' + escapeHtml(bookUrl) + '" target="_blank" rel="noopener noreferrer">' +
                escapeHtml(book.title) +
                "</a></strong><br>" +
                authorHtml +
                "<br>" +
                "<b>Year:</b> " +
                escapeHtml(book.year) +
                "<br>" +
                "<b>Languages:</b> " +
                escapeHtml(book.languages) +
                "<br>" +
                "<b>Subjects:</b> " +
                escapeHtml(subjectsShort) +
                "<br>" +
                "<b>Collections:</b> " +
                escapeHtml(book.collections);

              tooltip.classList.add("visible");
              ariaLive.textContent =
                book.title + " by " + book.author + ", " + book.year;
            })
              .on("mousemove", (event) => {
                const pad = 14;
                let left = event.clientX + pad;
                let top = event.clientY + pad;
                const tw = tooltip.offsetWidth;
                const th = tooltip.offsetHeight;
                if (left + tw > window.innerWidth - 10)
                  left = event.clientX - tw - pad;
                if (top + th > window.innerHeight - 10)
                  top = event.clientY - th - pad;
                tooltip.style.left = left + "px";
                tooltip.style.top = top + "px";
              })
              .on("mouseleave", () => {
                if (Date.now() - lastTouchTime > 500) {
                  tooltip.classList.remove("visible");
                }
              })
              .on("click", (event) => {
                if (Date.now() - lastTouchTime < 500) {
                  event.stopPropagation();
                  return;
                }
                window.open(
                  "https://cdn.solaranamnesis.com/library-test/examples/book_shelf.html#" +
                    encodeURIComponent(book.id),
                  "_blank",
                  "noopener,noreferrer",
                );
              })
              .on("keydown", (event) => {
                if (event.key === "Enter" || event.key === " ") {
                  event.preventDefault();
                  window.open(
                    "https://cdn.solaranamnesis.com/library-test/examples/book_shelf.html#" +
                      encodeURIComponent(book.id),
                    "_blank",
                    "noopener,noreferrer",
                  );
                }
              });
          });

          /* ---- zoom ---- */
          let currentTransform = d3.zoomIdentity;

          const zoom = d3
            .zoom()
            .scaleExtent([1, 50])
            .filter((event) => {
              /* wheel: require Ctrl / Meta so normal page scroll works */
              if (event.type === 'wheel') return event.ctrlKey || event.metaKey;
              /* allow touch & mouse, block auxiliary buttons */
              return !event.button;
            })
            .translateExtent([
              [margin.left, 0],
              [chartWidth - margin.right, chartHeight],
            ])
            .extent([
              [margin.left, 0],
              [chartWidth - margin.right, chartHeight],
            ])
            .on("zoom", (event) => {
              currentTransform = event.transform;
              const newX = event.transform.rescaleX(xScale);

              /* update axis */
              const newAxis = d3
                .axisBottom()
                .scale(newX)
                .tickValues(ticks.map((y) => sqrtVal(y)))
                .tickFormat((d) => {
                  const yr = Math.round(d * d + yearMin);
                  return String(yr);
                });
              gXAxis.call(newAxis);
              gXAxis.selectAll("text").style("font-size", "10px");

              /* update grid */
              gGrid.selectAll("line").each(function (d, idx) {
                const y = ticks[idx];
                const nx = newX(sqrtVal(y));
                d3.select(this).attr("x1", nx).attr("x2", nx);
              });

              /* update bars */
              const zoomedBarW = barMinWidth * Math.min(event.transform.k, 5);
              gBars.selectAll("g.bar-book").each(function (d, idx) {
                const book = filteredBooks[idx];
                if (!book) return;
                const nx = newX(sqrtVal(book._year));
                const rects = d3.select(this).selectAll("rect");
                /* colored bar */
                rects
                  .filter(function (d, i) {
                    return i === 0;
                  })
                  .attr("x", nx - zoomedBarW / 2)
                  .attr("width", zoomedBarW);
                /* hit area */
                rects
                  .filter(function (d, i) {
                    return i === 1;
                  })
                  .attr("x", nx + zoomedBarW / 2 + 4)
                  .attr(
                    "width",
                    Math.max(
                      chartWidth - margin.right - nx - zoomedBarW / 2 - 4,
                      0,
                    ),
                  );
                /* text */
                d3.select(this)
                  .select("text")
                  .attr("x", nx + zoomedBarW / 2 + 6);
              });
            });

          svg.call(zoom);

          /* track touch for mobile tooltip handling */
          svg.on("touchstart.track", function () {
            lastTouchTime = Date.now();
          });

          /* set default view: year 1600 to present year + 3 */
          const defaultStartYear = 1600;
          const defaultEndYear = Math.min(new Date().getFullYear() + 3, yearMax);
          const x1600 = xPos(defaultStartYear, xScale);
          const xPresent = xPos(defaultEndYear, xScale);
          const visibleWidth = chartWidth - margin.left - margin.right;
          const defaultK = visibleWidth / (xPresent - x1600);
          const defaultTx = margin.left - defaultK * x1600;
          const defaultTransform = d3.zoomIdentity
            .translate(defaultTx, 0)
            .scale(defaultK);
          svg.call(zoom.transform, defaultTransform);

          /* zoom buttons */
          document.getElementById("zoom-in").onclick = () => {
            svg.transition().duration(300).call(zoom.scaleBy, 1.5);
          };
          document.getElementById("zoom-out").onclick = () => {
            svg
              .transition()
              .duration(300)
              .call(zoom.scaleBy, 1 / 1.5);
          };
          document.getElementById("zoom-reset").onclick = () => {
            svg
              .transition()
              .duration(300)
              .call(zoom.transform, defaultTransform);
          };
        }

        /* dismiss tooltip on outside tap/click */
        const tooltipEl = document.getElementById("timeline-tooltip");
        document.addEventListener("click", (e) => {
          if (!tooltipEl.contains(e.target)) {
            tooltipEl.classList.remove("visible");
          }
        });

        /* initial render */
        render();

        /* ---- filter listeners ---- */
        function onFilterChange() {
          const anyActive =
            subjectSelect.value ||
            authorSelect.value ||
            languageSelect.value ||
            collectionSelect.value;

          document
            .getElementById("subject-wrapper")
            .classList.toggle("filter-active", !!subjectSelect.value);
          document
            .getElementById("author-wrapper")
            .classList.toggle("filter-active", !!authorSelect.value);
          document
            .getElementById("language-wrapper")
            .classList.toggle("filter-active", !!languageSelect.value);
          document
            .getElementById("collection-wrapper")
            .classList.toggle("filter-active", !!collectionSelect.value);

          const resetBtn = document.getElementById("reset-filters");
          resetBtn.style.display = anyActive ? "inline-block" : "none";

          render();
        }

        subjectSelect.addEventListener("change", onFilterChange);
        authorSelect.addEventListener("change", onFilterChange);
        languageSelect.addEventListener("change", onFilterChange);
        collectionSelect.addEventListener("change", onFilterChange);

        document
          .getElementById("reset-filters")
          .addEventListener("click", () => {
            subjectSelect.value = "";
            authorSelect.value = "";
            languageSelect.value = "";
            collectionSelect.value = "";
            onFilterChange();
          });

        /* ---- resize ---- */
        let resizeTimer;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(render, 250);
        });
      }
    </script>
  </body>
</html>
